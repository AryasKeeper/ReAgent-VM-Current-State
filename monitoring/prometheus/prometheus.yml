global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'reagent-sydney'
    environment: 'development'

rule_files:
  - "/etc/prometheus/alert_rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # ReAgent FastAPI application
  - job_name: 'reagent-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_labels: true
    params:
      format: ['prometheus']

  # ReAgent health monitoring service
  - job_name: 'reagent-health-monitor'
    static_configs:
      - targets: ['health-monitor:8001']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ReAgent agents orchestrator
  - job_name: 'reagent-orchestrator'
    static_configs:
      - targets: ['orchestrator:8002']  # Agent orchestrator metrics
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # PostgreSQL with TimescaleDB
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Weaviate vector database
  - job_name: 'weaviate'
    static_configs:
      - targets: ['weaviate:2112']  # Weaviate metrics port
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Celery worker metrics
  - job_name: 'celery-worker'
    static_configs:
      - targets: ['celery-worker:9540']  # Flower/Celery metrics port
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Node exporter for system metrics (if added to docker-compose)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # Docker container metrics (cAdvisor)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: '/metrics'

  # Grafana metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Custom ReAgent business metrics
  - job_name: 'reagent-business-metrics'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/api/v1/metrics/business'
    scrape_interval: 60s  # Business metrics less frequent
    scrape_timeout: 15s

  # ReAgent health check metrics
  - job_name: 'reagent-health'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/api/v1/health/metrics'
    scrape_interval: 30s
    scrape_timeout: 5s

  # External API performance monitoring
  - job_name: 'reagent-external-apis'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/api/v1/metrics/external-apis'
    scrape_interval: 60s
    scrape_timeout: 15s

  # Property data ingestion metrics
  - job_name: 'reagent-data-ingestion'
    static_configs:
      - targets: ['orchestrator:8002']
    metrics_path: '/metrics/ingestion'
    scrape_interval: 30s
    scrape_timeout: 10s
