# ReAgent Sydney - Fixed Weaviate Configuration
# Minimal working vector database setup

services:
  # PostgreSQL with TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: reagent
      POSTGRES_USER: reagent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reagent_dev_password}
      TIMESCALEDB_TELEMETRY: off
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reagent -d reagent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - reagent-net

  # Redis for caching  
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - reagent-net

  # Weaviate vector database - FIXED Configuration
  weaviate:
    env_file: .env
    image: semitechnologies/weaviate:1.21.8
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-openai'
      ENABLE_MODULES: 'text2vec-openai'
      OPENAI_APIKEY: ${OPENAI_API_KEY}
      CLUSTER_HOSTNAME: 'node1'
      # Disable all authentication to avoid OIDC issues
      AUTHENTICATION_APIKEY_ENABLED: 'false'
      AUTHENTICATION_OIDC_ENABLED: 'false'
      # Additional stability settings
      QUERY_MAXIMUM_RESULTS: 10000
      TRACK_VECTOR_DIMENSIONS: 'false'
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=3", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 40s
    networks:
      - reagent-net

volumes:
  postgres_data:
  redis_data:
  weaviate_data:

networks:
  reagent-net:
    driver: bridge