name: ReAgent Sydney CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # Code Quality Checks
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-
            ${{ runner.os }}-pip-
          
      - name: Install linting dependencies
        run: |
          pip install --upgrade pip
          pip install ruff black isort mypy types-redis types-PyYAML
          
      - name: Run Ruff linting
        run: ruff check src/ tests/ --output-format=github
        
      - name: Run Black formatter check
        run: black --check --diff src/ tests/
        
      - name: Run isort import sorting check
        run: isort --check-only --diff src/ tests/
        
      - name: Run mypy type checking
        run: mypy src/ --install-types --non-interactive --ignore-missing-imports

  # Python Tests
  test-python:
    runs-on: ubuntu-latest
    needs: lint-python
    
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: reagent_test
          POSTGRES_USER: reagent
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
          
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-asyncio pytest-mock factory-boy
          
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://reagent:test_password@localhost:5432/reagent_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          SECRET_KEY: test-secret-key
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=html
          
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # Frontend Tests (if frontend exists)
  test-frontend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
          
      - name: Run frontend linting
        run: |
          cd frontend
          npm run lint
          
      - name: Run frontend tests
        run: |
          cd frontend
          npm run test

  # Security Scanning
  security-scan:
    runs-on: ubuntu-latest
    needs: [lint-python]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('requirements.txt') }}
          
      - name: Install security tools
        run: |
          pip install --upgrade pip
          pip install safety bandit semgrep pip-audit
          
      - name: Run pip-audit for known vulnerabilities
        run: pip-audit -r requirements.txt --format=json --output=pip-audit-report.json
        continue-on-error: true
        
      - name: Run safety check for known vulnerabilities
        run: safety check -r requirements.txt --json --output=safety-report.json
        continue-on-error: true
        
      - name: Run bandit security linting
        run: bandit -r src/ -f json -o bandit-report.json
        continue-on-error: true
        
      - name: Run semgrep security analysis
        run: |
          semgrep --config=auto src/ --json --output=semgrep-report.json
        continue-on-error: true
        
      - name: Upload security reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-reports
          path: |
            pip-audit-report.json
            safety-report.json
            bandit-report.json
            semgrep-report.json

  # Docker Build Test
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-python]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build API Docker image
        run: |
          docker build -f Dockerfile.api -t reagent-api:test .
          
      - name: Build Agents Docker image
        run: |
          docker build -f Dockerfile.agents -t reagent-agents:test .
          
      - name: Test Docker Compose setup
        run: |
          docker-compose -f docker-compose.test.yml up -d --build
          
      - name: Wait for services to be ready
        run: |
          timeout 180 bash -c 'until docker-compose -f docker-compose.test.yml exec -T api-test curl -f http://localhost:8000/health; do sleep 5; done'
          
      - name: Run basic API tests
        run: |
          docker-compose -f docker-compose.test.yml exec -T api-test python -c "import requests; r = requests.get('http://localhost:8000/health'); print(f'Health check: {r.status_code}'); assert r.status_code == 200"
          
      - name: Cleanup Docker Compose
        if: always()
        run: docker-compose -f docker-compose.test.yml down -v

  # Integration Tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: [test-python, docker-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Start full stack for integration tests
        run: |
          cp .env.example .env
          docker-compose up -d --build
          
      - name: Wait for services to be ready
        run: |
          timeout 300 bash -c 'until curl -f http://localhost:8000/health; do sleep 5; done'
          timeout 300 bash -c 'until curl -f http://localhost:8080/v1/.well-known/ready; do sleep 5; done'
          
      - name: Run integration tests
        run: |
          docker-compose exec -T api pytest tests/integration/ -v
          
      - name: Cleanup
        run: docker-compose down -v

  # Staging Deployment (develop branch)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend, security-scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Railway (Staging)
        run: |
          npm install -g @railway/cli
          railway login --token ${{ secrets.RAILWAY_TOKEN }}
          railway up --service reagent-api-staging --dockerfile Dockerfile.api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # Production Deployment (main branch)
  deploy-production:
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend, security-scan, integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/reagent-api:latest
            ${{ secrets.DOCKER_USERNAME }}/reagent-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          
      - name: Build and push Agents image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.agents
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/reagent-agents:latest
            ${{ secrets.DOCKER_USERNAME }}/reagent-agents:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          
      - name: Build and push Celery image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.celery
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/reagent-celery:latest
            ${{ secrets.DOCKER_USERNAME }}/reagent-celery:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          
      # Deploy to Railway (API service)
      - name: Deploy API to Railway
        if: github.ref == 'refs/heads/main'
        run: |
          npm install -g @railway/cli
          railway login --token ${{ secrets.RAILWAY_TOKEN }}
          railway up --service reagent-api --dockerfile Dockerfile.api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          
      # Deploy agents to Render
      - name: Deploy Agents to Render
        if: github.ref == 'refs/heads/main'
        uses: JorgeLNJunior/render-deploy@v1.4.4
        with:
          service_id: ${{ secrets.RENDER_SERVICE_ID_AGENTS }}
          api_key: ${{ secrets.RENDER_API_KEY }}
          wait_deploy: true
          
      # Deploy frontend to Vercel
      - name: Deploy Frontend to Vercel
        if: github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod'
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          
  # Notification
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
      - name: Notify deployment status
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#reagent-deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}