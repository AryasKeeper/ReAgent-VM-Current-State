version: '3.8'

services:
  # Test PostgreSQL with TimescaleDB
  postgres-test:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: reagent_test
      POSTGRES_USER: reagent
      POSTGRES_PASSWORD: test_password
      TIMESCALEDB_TELEMETRY: off
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reagent -d reagent_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data

  # Test Redis for caching
  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    tmpfs:
      - /data

  # Test Weaviate vector database
  weaviate-test:
    image: semitechnologies/weaviate:1.21.2
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-openai'
      ENABLE_MODULES: 'text2vec-openai'
      CLUSTER_HOSTNAME: 'node1'
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/weaviate

  # FastAPI backend for testing
  api-test:
    build: 
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+asyncpg://reagent:test_password@postgres-test:5432/reagent_test
      REDIS_URL: redis://redis-test:6379/0
      WEAVIATE_URL: http://weaviate-test:8080
      OPENAI_API_KEY: test-key
      DOMAIN_API_KEY: test-key
      REA_API_KEY: test-key
      ENVIRONMENT: test
      SECRET_KEY: test-secret-key
      LOG_LEVEL: DEBUG
    ports:
      - "8001:8000"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      weaviate-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Test agents container
  agents-test:
    build:
      context: .
      dockerfile: Dockerfile.agents
    environment:
      DATABASE_URL: postgresql+asyncpg://reagent:test_password@postgres-test:5432/reagent_test
      REDIS_URL: redis://redis-test:6379/0
      WEAVIATE_URL: http://weaviate-test:8080
      OPENAI_API_KEY: test-key
      DOMAIN_API_KEY: test-key
      REA_API_KEY: test-key
      ENVIRONMENT: test
      LOG_LEVEL: DEBUG
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      weaviate-test:
        condition: service_healthy

networks:
  default:
    name: reagent-test-network