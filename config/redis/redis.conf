# ReAgent Sydney - Redis Production Configuration
# Optimized for caching and session management

# =================================================================
# NETWORK AND SECURITY
# =================================================================

# Network
bind 127.0.0.1 ::1
protected-mode yes
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 60

# Security - Password will be set via environment
# requirepass will be set via command line with REDIS_PASSWORD

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG ""
rename-command SHUTDOWN SHUTDOWN_SAFE
rename-command EVAL ""

# =================================================================
# GENERAL CONFIGURATION
# =================================================================

# Daemon mode
daemonize no
supervised no

# Process management
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""
syslog-enabled no

# Databases
databases 16

# =================================================================
# MEMORY MANAGEMENT
# =================================================================

# Memory policy - LRU eviction for cache use case  
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Memory optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100

# =================================================================
# PERSISTENCE
# =================================================================

# RDB (snapshot) persistence
save 900 1     # Save after 900 sec if at least 1 key changed
save 300 10    # Save after 300 sec if at least 10 keys changed  
save 60 10000  # Save after 60 sec if at least 10000 keys changed

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir ./

# AOF (append-only file) persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# =================================================================
# REPLICATION
# =================================================================

# Replica settings (if using Redis Sentinel)
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 5
repl-ping-replica-period 10
repl-timeout 60
repl-disable-tcp-nodelay no
repl-backlog-size 1mb
repl-backlog-ttl 3600

# =================================================================
# PERFORMANCE TUNING
# =================================================================

# Client connections
maxclients 10000

# Slow log
slowlog-log-slower-than 10000  # 10ms
slowlog-max-len 128

# Latency tracking
latency-monitor-threshold 100

# Threading (Redis 6.0+)
# io-threads 2
# io-threads-do-reads yes

# =================================================================
# ADVANCED CONFIG
# =================================================================

# Hash table rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Client query buffer
client-query-buffer-limit 1gb

# Protocol max bulk size
proto-max-bulk-len 512mb

# Frequency of Redis background tasks
hz 10

# Lazy deletion
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# Defrag
# activedefrag yes
# active-defrag-ignore-bytes 100mb
# active-defrag-threshold-lower 10
# active-defrag-threshold-upper 100
# active-defrag-cycle-min 5
# active-defrag-cycle-max 75

# Jemalloc background thread
jemalloc-bg-thread yes

# =================================================================
# MODULE LOADING
# =================================================================

# Load modules here if needed
# loadmodule /path/to/my_module.so

# =================================================================
# MONITORING AND DEBUGGING
# =================================================================

# Enable stats collection
# tracking-table-max-keys 1000000