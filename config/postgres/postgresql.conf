# ReAgent Sydney - PostgreSQL Production Configuration
# Optimized for real estate data workloads with TimescaleDB

# =================================================================
# CONNECTION AND AUTHENTICATION
# =================================================================

# Connection settings
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# SSL settings
ssl = off  # Managed by Docker network isolation
ssl_cert_file = 'server.crt'
ssl_key_file = 'server.key'

# Authentication
password_encryption = scram-sha-256
db_user_namespace = off

# =================================================================
# RESOURCE USAGE (MEMORY)
# =================================================================

# Memory settings optimized for 4GB+ systems
shared_buffers = 256MB              # 25% of RAM for small systems
huge_pages = try
temp_buffers = 32MB
work_mem = 4MB                      # Per operation memory
hash_mem_multiplier = 1.0
maintenance_work_mem = 64MB         # VACUUM, CREATE INDEX, etc.
autovacuum_work_mem = -1            # Use maintenance_work_mem
max_stack_depth = 2MB
dynamic_shared_memory_type = posix

# =================================================================
# RESOURCE USAGE (DISK)
# =================================================================

# Temporary file settings
temp_file_limit = -1
temp_tablespaces = ''

# =================================================================
# RESOURCE USAGE (KERNEL RESOURCES)
# =================================================================

max_files_per_process = 1000
shared_preload_libraries = 'timescaledb,pg_stat_statements'

# =================================================================
# WRITE AHEAD LOG
# =================================================================

# WAL settings for reliability and performance
wal_level = replica
fsync = on
synchronous_commit = on
wal_sync_method = fsync
full_page_writes = on
wal_compression = on
wal_log_hints = off
wal_buffers = 16MB
wal_writer_delay = 200ms
wal_writer_flush_after = 1MB

# Checkpoints
checkpoint_timeout = 5min
checkpoint_completion_target = 0.9
checkpoint_flush_after = 256kB
checkpoint_warning = 30s
max_wal_size = 1GB
min_wal_size = 80MB

# Archiving (for backup)
archive_mode = off
archive_command = ''
archive_timeout = 0

# =================================================================
# REPLICATION
# =================================================================

# Replication settings for read replica
max_wal_senders = 10
max_replication_slots = 10
track_commit_timestamp = off
wal_receiver_status_interval = 10s
hot_standby_feedback = off
wal_receiver_timeout = 60s
max_logical_replication_workers = 4
max_sync_workers_per_subscription = 2

# =================================================================
# QUERY TUNING
# =================================================================

# Planner settings
enable_bitmapscan = on
enable_hashagg = on
enable_hashjoin = on
enable_indexscan = on
enable_indexonlyscan = on
enable_material = on
enable_mergejoin = on
enable_nestloop = on
enable_parallel_append = on
enable_parallel_hash = on
enable_partition_pruning = on
enable_partitionwise_join = off
enable_partitionwise_aggregate = off
enable_seqscan = on
enable_sort = on
enable_tidscan = on

# Planner cost constants (tuned for SSD storage)
seq_page_cost = 1.0
random_page_cost = 1.1              # SSD optimized
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025
parallel_tuple_cost = 0.1
parallel_setup_cost = 1000.0
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# Genetic query optimizer
geqo = on
geqo_threshold = 12
geqo_effort = 5
geqo_pool_size = 0
geqo_generations = 0
geqo_selection_bias = 2.0
geqo_seed = 0.0

# Other planner options
default_statistics_target = 100
constraint_exclusion = partition
cursor_tuple_fraction = 0.1
from_collapse_limit = 8
join_collapse_limit = 8
force_parallel_mode = off

# =================================================================
# ERROR REPORTING AND LOGGING
# =================================================================

# Where to log
log_destination = 'stderr'
logging_collector = off
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_truncate_on_rotation = off
log_rotation_age = 1d
log_rotation_size = 10MB

# When to log
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 1000   # Log queries > 1 second

# What to log
debug_print_parse = off
debug_print_rewritten = off
debug_print_plan = off
debug_pretty_print = on
log_checkpoints = on
log_connections = off
log_disconnections = off
log_duration = off
log_error_verbosity = default
log_hostname = off
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_lock_waits = on
log_statement = 'none'
log_replication_commands = off
log_temp_files = 10MB
log_timezone = 'Australia/Sydney'

# =================================================================
# RUNTIME STATISTICS
# =================================================================

# Query/index statistics collector
track_activities = on
track_counts = on
track_io_timing = on
track_functions = pl
track_activity_query_size = 1024
stats_temp_directory = 'pg_stat_tmp'

# Statistics monitoring
compute_query_id = on
log_parser_stats = off
log_planner_stats = off
log_executor_stats = off
log_statement_stats = off

# =================================================================
# AUTOVACUUM PARAMETERS
# =================================================================

# Autovacuum settings optimized for high-churn real estate data
autovacuum = on
log_autovacuum_min_duration = 0
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1
autovacuum_freeze_max_age = 200000000
autovacuum_multixact_freeze_max_age = 400000000
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 400

# =================================================================
# CLIENT CONNECTION DEFAULTS
# =================================================================

# Statement behavior
search_path = '"$user", public'
row_security = on
default_tablespace = ''
temp_tablespaces = ''
default_table_access_method = heap
default_toast_compression = pglz
check_function_bodies = on
default_transaction_isolation = 'read committed'
default_transaction_read_only = off
default_transaction_deferrable = off
session_replication_role = 'origin'
statement_timeout = 0
lock_timeout = 0
idle_in_transaction_session_timeout = 0
vacuum_freeze_min_age = 50000000
vacuum_freeze_table_age = 150000000
vacuum_multixact_freeze_min_age = 5000000
vacuum_multixact_freeze_table_age = 150000000
vacuum_cleanup_index_scale_factor = 0.1
bytea_output = 'hex'
xmlbinary = 'base64'
xmloption = 'content'
gin_fuzzy_search_limit = 0
gin_pending_list_limit = 4MB

# Locale and formatting
datestyle = 'iso, mdy'
intervalstyle = 'postgres'
timezone = 'Australia/Sydney'
timezone_abbreviations = 'Default'
extra_float_digits = 1
client_encoding = utf8

# Shared library preloading
local_preload_libraries = ''
session_preload_libraries = ''
shared_preload_libraries = 'timescaledb,pg_stat_statements'
jit_provider = 'llvmjit'

# Other defaults
dynamic_library_path = '$libdir'
gin_fuzzy_search_limit = 0

# =================================================================
# LOCK MANAGEMENT
# =================================================================

deadlock_timeout = 1s
max_locks_per_transaction = 64
max_pred_locks_per_transaction = 64
max_pred_locks_per_relation = -2
max_pred_locks_per_page = 2

# =================================================================
# VERSION/PLATFORM COMPATIBILITY
# =================================================================

array_nulls = on
backslash_quote = safe_encoding
escape_string_warning = on
lo_compat_privileges = off
operator_precedence_warning = off
quote_all_identifiers = off
standard_conforming_strings = on
synchronize_seqscans = on
transform_null_equals = off

# =================================================================
# ERROR HANDLING
# =================================================================

exit_on_error = off
restart_after_crash = on

# =================================================================
# CONFIG FILE INCLUDES
# =================================================================

# These options allow settings to be loaded from files other than the
# default postgresql.conf.

#include_dir = 'conf.d'
#include_if_exists = 'exists.conf'
#include = 'special.conf'

# =================================================================
# TIMESCALEDB SPECIFIC SETTINGS
# =================================================================

# TimescaleDB configuration
timescaledb.max_background_workers = 8
timescaledb.telemetry_level = off