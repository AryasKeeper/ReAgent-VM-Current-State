# ReAgent Sydney - Optimized Production Docker Infrastructure
# Enhanced with improved health checks, resource allocation, and build optimization
version: '3.8'

services:
  # PostgreSQL with TimescaleDB - Primary Database
  postgres:
    env_file: .env
    image: timescale/timescaledb:latest-pg15
    container_name: reagent-postgres
    environment:
      POSTGRES_DB: reagent
      POSTGRES_USER: reagent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reagent_dev_password}
      TIMESCALEDB_TELEMETRY: off
      # Production performance settings
      POSTGRES_SHARED_PRELOAD_LIBRARIES: 'timescaledb'
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS:-200}
      POSTGRES_SHARED_BUFFERS: ${POSTGRES_SHARED_BUFFERS:-256MB}
      POSTGRES_EFFECTIVE_CACHE_SIZE: ${POSTGRES_EFFECTIVE_CACHE_SIZE:-1GB}
      POSTGRES_WORK_MEM: ${POSTGRES_WORK_MEM:-16MB}
      POSTGRES_MAINTENANCE_WORK_MEM: ${POSTGRES_MAINTENANCE_WORK_MEM:-256MB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d:ro
      - ./data/backups/postgres:/backups
      - ./config/postgres:/etc/postgresql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reagent -d reagent && psql -U reagent -d reagent -c 'SELECT 1' > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s
    restart: unless-stopped
    networks:
      - reagent_network
    deploy:
      resources:
        limits:
          memory: 1.5G  # Optimized from 2G
          cpus: '1.0'   # Optimized from 1.5
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis - Caching and Pub/Sub  
  redis:
    env_file: .env
    image: redis:7-alpine
    container_name: reagent-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
      --timeout 0
    volumes:
      - redis_data:/data
      - ./config/redis:/usr/local/etc/redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M  # Optimized from 1G
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    networks:
      - reagent_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Weaviate - Vector Database with OpenAI Integration
  weaviate:
    env_file: .env
    image: cr.weaviate.io/semitechnologies/weaviate:1.24.1
    container_name: reagent-weaviate
    environment:
      # Authentication configuration
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: '${WEAVIATE_ANONYMOUS_ACCESS:-true}'
      AUTHENTICATION_OIDC_ENABLED: 'false'
      AUTHENTICATION_APIKEY_ENABLED: '${WEAVIATE_APIKEY_ENABLED:-false}'
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: '${WEAVIATE_API_KEY:-}'
      AUTHENTICATION_APIKEY_USERS: '${WEAVIATE_API_USERS:-}'
      # OpenAI integration configuration
      OPENAI_APIKEY: '${OPENAI_API_KEY}'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-openai'
      ENABLE_MODULES: 'text2vec-openai,text2vec-cohere,text2vec-huggingface,qna-openai,generative-openai,reranker-cohere'
      # Performance and persistence settings
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      QUERY_DEFAULTS_LIMIT: 25
      QUERY_MAXIMUM_RESULTS: 10000
      CLUSTER_HOSTNAME: 'node1'
      # Memory and performance optimization
      GOMEMLIMIT: '${WEAVIATE_MEMORY_LIMIT:-2.5GiB}'  # Optimized from 3GiB
      GOMAXPROCS: '${WEAVIATE_MAX_PROCS:-3}'          # Optimized from 4
      # Backup configuration
      BACKUP_FILESYSTEM_PATH: '/var/lib/weaviate/backups'
      # Logging configuration
      LOG_LEVEL: '${WEAVIATE_LOG_LEVEL:-info}'
      LOG_FORMAT: 'json'
      # Monitoring
      PROMETHEUS_MONITORING_ENABLED: 'true'
      PROMETHEUS_MONITORING_PORT: '2112'
    volumes:
      - weaviate_data:/var/lib/weaviate
      - ./data/backups/weaviate:/var/lib/weaviate/backups
      - ./config/weaviate:/weaviate/config
    ports:
      - "${WEAVIATE_PORT:-8080}:8080"
      - "${WEAVIATE_METRICS_PORT:-2112}:2112"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v1/.well-known/ready && wget -qO- http://localhost:8080/v1/.well-known/live || exit 1"]
      interval: 25s     # Optimized from 20s
      timeout: 15s      # Increased from 10s
      retries: 4        # Increased from 3
      start_period: 120s # Optimized from 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${WEAVIATE_MEMORY_LIMIT:-3G}    # Maintained for vector operations
          cpus: '${WEAVIATE_CPU_LIMIT:-1.5}'      # Optimized from 2.0
        reservations:
          memory: 1G
          cpus: '0.5'
    networks:
      - reagent_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI - Main API Service
  api:
    env_file: .env
    build: 
      context: .
      dockerfile: Dockerfile.api
      target: production
    container_name: reagent-api
    environment:
      # Database configuration
      DATABASE_URL: postgresql+asyncpg://reagent:${POSTGRES_PASSWORD:-reagent_dev_password}@postgres:5432/reagent
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-15}     # Optimized from 20
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-25} # Optimized from 30
      # Cache configuration
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CACHE_TTL: ${CACHE_TTL:-3600}
      # Vector database configuration
      WEAVIATE_URL: http://weaviate:8080
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-}
      # External API keys
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DOMAIN_API_KEY: ${DOMAIN_API_KEY}
      REA_API_KEY: ${REA_API_KEY}
      CORELOGIC_API_KEY: ${CORELOGIC_API_KEY}
      NSW_LPI_API_KEY: ${NSW_LPI_API_KEY}
      # Application settings
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # Performance settings
      WORKERS: ${API_WORKERS:-3}                    # Optimized from 4
      WORKER_CONNECTIONS: ${API_WORKER_CONNECTIONS:-1000}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./logs:/app/logs
      - ./config/api:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "8", "--connect-timeout", "5", "http://localhost:8000/api/v1/health/ready"]
      interval: 30s     # Optimized from 15s
      timeout: 10s      # Increased from 5s
      retries: 5        # Increased from 3
      start_period: 180s # Increased from 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-1.5G}    # Optimized from 2G
          cpus: '${API_CPU_LIMIT:-1.0}'        # Optimized from 1.5
        reservations:
          memory: 512M
          cpus: '0.5'
    networks:
      - reagent_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Health Monitoring Service
  health-monitor:
    env_file: .env
    build:
      context: .
      dockerfile: Dockerfile.health-monitor
    container_name: reagent-health-monitor
    environment:
      # Database configuration
      DATABASE_URL: postgresql+asyncpg://reagent:${POSTGRES_PASSWORD:-reagent_dev_password}@postgres:5432/reagent
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      WEAVIATE_URL: http://weaviate:8080
      # Monitoring configuration
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL:-30}
      RECOVERY_ENABLED: ${HEALTH_RECOVERY_ENABLED:-true}
      FEATURE_FLAGS_ENABLED: ${FEATURE_FLAGS_ENABLED:-true}
      # Service endpoints
      API_HEALTH_URL: http://api:8000/api/v1/health
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      WEAVIATE_HOST: weaviate
      # Alerting configuration
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      EMAIL_ALERTS_ENABLED: ${EMAIL_ALERTS_ENABLED:-false}
      ALERT_THRESHOLDS: ${ALERT_THRESHOLDS:-critical=3,warning=5}
    ports:
      - "${HEALTH_MONITOR_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./config/health-monitor:/app/config:ro
      - ./data/health-reports:/app/reports
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "5", "http://localhost:8001/health"]
      interval: 45s     # Optimized from 30s
      timeout: 10s
      retries: 3
      start_period: 90s # Optimized from 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M  # Optimized from 512M
          cpus: '0.25'  # Optimized from 0.5
        reservations:
          memory: 128M
          cpus: '0.1'
    networks:
      - reagent_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # LangGraph Agent Orchestrator
  orchestrator:
    env_file: .env
    build:
      context: .
      dockerfile: Dockerfile.agents
    container_name: reagent-orchestrator
    environment:
      # Database configuration
      DATABASE_URL: postgresql+asyncpg://reagent:${POSTGRES_PASSWORD:-reagent_dev_password}@postgres:5432/reagent
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-8}      # Optimized from 10
      # Cache configuration
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      REDIS_PUBSUB_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      # Vector database configuration
      WEAVIATE_URL: http://weaviate:8080
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-}
      # External API keys
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DOMAIN_API_KEY: ${DOMAIN_API_KEY}
      REA_API_KEY: ${REA_API_KEY}
      CORELOGIC_API_KEY: ${CORELOGIC_API_KEY}
      NSW_LPI_API_KEY: ${NSW_LPI_API_KEY}
      # Agent configuration
      AGENT_CONCURRENCY: ${AGENT_CONCURRENCY:-4}        # Optimized from 5
      AGENT_TIMEOUT: ${AGENT_TIMEOUT:-300}
      ORCHESTRATION_MODE: ${ORCHESTRATION_MODE:-async}
      # Application settings
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      api:
        condition: service_healthy
      health-monitor:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./logs:/app/logs
      - ./config/agents:/app/config:ro
      - ./data/agent-state:/app/state
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.from_url('redis://:${REDIS_PASSWORD:-}@redis:6379/0'); r.ping(); print('OK')"]
      interval: 45s     # Optimized from 30s
      timeout: 15s      # Increased from 10s
      retries: 4        # Increased from 3
      start_period: 240s # Increased from 180s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${ORCHESTRATOR_MEMORY_LIMIT:-2G}    # Optimized from 3G
          cpus: '${ORCHESTRATOR_CPU_LIMIT:-1.5}'      # Optimized from 2.0
        reservations:
          memory: 1G
          cpus: '0.5'
    networks:
      - reagent_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Worker - Background Task Processing
  celery-worker:
    env_file: .env
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: reagent-celery-worker
    environment:
      # Database configuration
      DATABASE_URL: postgresql+asyncpg://reagent:${POSTGRES_PASSWORD:-reagent_dev_password}@postgres:5432/reagent
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-6}      # Optimized from 10
      # Cache and broker configuration
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/2
      # Vector database configuration
      WEAVIATE_URL: http://weaviate:8080
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-}
      # External API keys
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DOMAIN_API_KEY: ${DOMAIN_API_KEY}
      REA_API_KEY: ${REA_API_KEY}
      CORELOGIC_API_KEY: ${CORELOGIC_API_KEY}
      NSW_LPI_API_KEY: ${NSW_LPI_API_KEY}
      # Celery configuration
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-3}             # Optimized from 4
      CELERY_PREFETCH_MULTIPLIER: ${CELERY_PREFETCH_MULTIPLIER:-1}
      CELERY_MAX_TASKS_PER_CHILD: ${CELERY_MAX_TASKS_PER_CHILD:-1000}
      # Application settings
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./logs:/app/logs
      - ./config/celery:/app/config:ro
    healthcheck:
      test: ["CMD", "python", "-c", "from src.reagent.core.celery import celery_app; i=celery_app.control.inspect(); stats=i.stats(); stats and print('OK') or exit(1)"]
      interval: 45s     # Optimized from 30s
      timeout: 20s      # Increased from 15s
      retries: 4        # Increased from 3
      start_period: 90s # Optimized from 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${CELERY_MEMORY_LIMIT:-768M}    # Optimized from 1G
          cpus: '${CELERY_CPU_LIMIT:-0.75}'       # Optimized from 1.0
        reservations:
          memory: 256M
          cpus: '0.25'
    networks:
      - reagent_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Beat - Task Scheduler
  celery-beat:
    env_file: .env
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: reagent-celery-beat
    command: celery -A src.reagent.core.celery beat --loglevel=info --schedule=/app/celerybeat-schedule/celerybeat-schedule
    environment:
      # Database configuration
      DATABASE_URL: postgresql+asyncpg://reagent:${POSTGRES_PASSWORD:-reagent_dev_password}@postgres:5432/reagent
      # Cache and broker configuration
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/2
      # External API keys
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DOMAIN_API_KEY: ${DOMAIN_API_KEY}
      REA_API_KEY: ${REA_API_KEY}
      CORELOGIC_API_KEY: ${CORELOGIC_API_KEY}
      NSW_LPI_API_KEY: ${NSW_LPI_API_KEY}
      # Beat configuration
      CELERY_BEAT_SCHEDULE_FILENAME: ${CELERY_BEAT_SCHEDULE:-/app/celerybeat-schedule/celerybeat-schedule}
      # Application settings
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./logs:/app/logs
      - ./config/celery:/app/config:ro
      - celery_beat_schedule:/app/celerybeat-schedule
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; pid_file='/app/celerybeat-schedule/celerybeat.pid'; os.path.exists(pid_file) and (time.time() - os.path.getmtime(pid_file) < 300) and print('OK') or exit(1)"]
      interval: 60s     # Optimized from 45s
      timeout: 10s
      retries: 3
      start_period: 60s # Optimized from 45s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M  # Optimized from 512M
          cpus: '0.25'  # Optimized from 0.5
        reservations:
          memory: 128M
          cpus: '0.1'
    networks:
      - reagent_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named Volumes for Data Persistence
volumes:
  postgres_data:
    driver: local
    name: reagent-postgres-data
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/postgres
  redis_data:
    driver: local
    name: reagent-redis-data
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/redis
  weaviate_data:
    driver: local
    name: reagent-weaviate-data
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/weaviate
  celery_beat_schedule:
    driver: local
    name: reagent-celery-beat-schedule
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/celery-beat

# Production Network Configuration
networks:
  reagent_network:
    name: reagent-production-network
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${NETWORK_SUBNET:-172.20.0.0/16}
          gateway: ${NETWORK_GATEWAY:-172.20.0.1}
    driver_opts:
      com.docker.network.bridge.name: reagent-br0
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: ${NETWORK_MTU:-1500}