version: '3.8'

# ReAgent Sydney - Monitoring Stack
# Complete observability infrastructure

services:
  # =================================================================
  # METRICS COLLECTION
  # =================================================================

  # Prometheus metrics server
  prometheus:
    image: prom/prometheus:v2.40.7
    container_name: reagent-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--log.level=info'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules:/etc/prometheus/alert_rules:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - reagent-monitoring
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.3'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # AlertManager for alert routing
  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: reagent-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
      - '--log.level=info'
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./monitoring/alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - reagent-monitoring
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - ALERTMANAGER_WEBHOOK_URL=${ALERTMANAGER_WEBHOOK_URL}
      - PAGERDUTY_SERVICE_KEY=${PAGERDUTY_SERVICE_KEY}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "2"

  # Grafana visualization platform
  grafana:
    image: grafana/grafana:9.3.2
    container_name: reagent-grafana
    environment:
      # Security settings
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_USERS_ALLOW_ORG_CREATE: false
      GF_USERS_AUTO_ASSIGN_ORG: true
      GF_USERS_AUTO_ASSIGN_ORG_ID: 1
      
      # Server settings
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-localhost}
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN:-localhost}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: true
      
      # Database settings (for session storage)
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: reagent
      GF_DATABASE_USER: reagent
      GF_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      GF_DATABASE_SSL_MODE: disable
      
      # Authentication
      GF_AUTH_ANONYMOUS_ENABLED: false
      GF_AUTH_DISABLE_LOGIN_FORM: false
      
      # Alerting
      GF_ALERTING_ENABLED: true
      GF_UNIFIED_ALERTING_ENABLED: true
      
      # Plugins
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel
      
      # Performance
      GF_RENDERING_SERVER_URL: http://grafana-renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./logs/grafana:/var/log/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - reagent-monitoring
      - reagent-backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.8'
        reservations:
          memory: 256M
          cpus: '0.2'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Grafana image renderer for PDF reports
  grafana-renderer:
    image: grafana/grafana-image-renderer:3.6.1
    container_name: reagent-grafana-renderer
    environment:
      - ENABLE_METRICS=true
      - HTTP_PORT=8081
    ports:
      - "127.0.0.1:8081:8081"
    networks:
      - reagent-monitoring
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # =================================================================
  # INFRASTRUCTURE EXPORTERS
  # =================================================================

  # PostgreSQL metrics exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.11.1
    container_name: reagent-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://reagent:${POSTGRES_PASSWORD}@postgres:5432/reagent?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: "/etc/postgres_exporter/queries.yaml"
      PG_EXPORTER_CONSTANT_LABELS: "environment=production,service=reagent"
    volumes:
      - ./monitoring/exporters/postgres-queries.yaml:/etc/postgres_exporter/queries.yaml:ro
    ports:
      - "127.0.0.1:9187:9187"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - reagent-monitoring
      - reagent-backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'

  # PostgreSQL replica exporter
  postgres-replica-exporter:
    image: prometheuscommunity/postgres-exporter:v0.11.1
    container_name: reagent-postgres-replica-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://reagent:${POSTGRES_PASSWORD}@postgres-replica:5432/reagent?sslmode=disable"
      PG_EXPORTER_CONSTANT_LABELS: "environment=production,service=reagent,role=replica"
    ports:
      - "127.0.0.1:9188:9187"
    depends_on:
      - postgres-replica
    restart: unless-stopped
    networks:
      - reagent-monitoring
      - reagent-backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'

  # Redis metrics exporter
  redis-exporter:
    image: oliver006/redis_exporter:v1.45.0
    container_name: reagent-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis-master:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      REDIS_EXPORTER_INCL_SYSTEM_METRICS: "true"
    ports:
      - "127.0.0.1:9121:9121"
    depends_on:
      - redis-master
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - reagent-monitoring
      - reagent-backend
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'

  # Nginx metrics exporter
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:0.10.0
    container_name: reagent-nginx-exporter
    command:
      - '--nginx.scrape-uri=http://nginx:8080/nginx_status'
      - '--web.telemetry-path=/metrics'
    ports:
      - "127.0.0.1:9113:9113"
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - reagent-monitoring
      - reagent-frontend
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.1'

  # Celery task queue exporter
  celery-exporter:
    image: danihodovic/celery-exporter:0.10.3
    container_name: reagent-celery-exporter
    environment:
      CELERY_EXPORTER_BROKER_URL: "redis://:${REDIS_PASSWORD}@redis-master:6379/1"
      CELERY_EXPORTER_LISTEN_ADDRESS: "0.0.0.0:9540"
      CELERY_EXPORTER_MAX_TASKS: "10000"
    ports:
      - "127.0.0.1:9540:9540"
    depends_on:
      - redis-master
    restart: unless-stopped
    networks:
      - reagent-monitoring
      - reagent-backend
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'

  # System metrics collector
  node-exporter:
    image: prom/node-exporter:v1.5.0
    container_name: reagent-node-exporter
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.systemd'
      - '--collector.processes'
    volumes:
      - /:/host:ro,rslave
      - /sys:/host/sys:ro
      - /proc:/host/proc:ro
    ports:
      - "127.0.0.1:9100:9100"
    pid: host
    network_mode: host
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'

  # Container metrics collector
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.46.0
    container_name: reagent-cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    networks:
      - reagent-monitoring
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

# =================================================================
# VOLUMES
# =================================================================

volumes:
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/prometheus

  alertmanager_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/alertmanager

  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/grafana

# =================================================================
# NETWORKS
# =================================================================

networks:
  reagent-monitoring:
    external: true
  reagent-backend:
    external: true
  reagent-frontend:
    external: true